name: Push label_convert to pypi

on:
  push:
    # branches: [ main ]
    # paths:
      # - 'label_convert/**'
      # - 'docs/doc_whl.md'
      # - 'setup.py'
      # - '.github/workflows/gen_whl_to_pypi.yml'
    tags:
      - v*

jobs:
  UnitTesting:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Unit testings with label_convert
        run: |
          pip install -r requirements.txt
          pip install pytest
          pytest tests/test*.py

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          python -m pip install --upgrade pip
          pip install -q build

      - name: Verify release tag
        run: |
          test -n "$GITHUB_REF_NAME"
          git tag --points-at HEAD | grep -Fx "$GITHUB_REF_NAME"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_RAPIDOCR=$VERSION" >> "$GITHUB_ENV"
          echo "Building rapidocr version: $VERSION"

      - name: Build wheel package
        run: |
          python -m build --wheel
          mv dist ../

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: dist/
